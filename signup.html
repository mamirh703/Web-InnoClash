<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InnoClash 2025 | Innovation Competition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body{
            background-color: #061227;
            font-family: sans-serif;
        }

        @font-face {
            font-family: myFont;
            src: url(meqanor-font/meqanor.otf);
        }

        .nav {
            background-color: #669bbc; 
            overflow: hidden;
            max-height: 6rem;
            display: flex;
            align-items: center;
            gap: 3rem;
            max-width: 2160px;
            justify-content: space-between;
        }

        .title-cont {
            font-size: 3rem;
            font-family: myFont;
            color: wheat;
            padding: 1rem;
        }

        .nav-cont {
            float: right;
            text-align: right;
            padding: 15px 12px;
            font-size: 1rem;
        }

        .nav-cont a {
            color: black;
            text-decoration: none;
            padding: 12px;
            transition: 0.3s ease;
        }

        .nav-cont a:hover{
            color: whitesmoke;
        }

        .title {
            text-align: center;
            padding: 2rem;
            line-height: 0.9;
        }

        .title h1 {
            color: wheat;
            font-size: 4rem;
        }

        .title p {
            color: white;
            font-size: 1.4rem;
        }

        .form-cont {
            background: rgb(229, 225, 237);
            max-width: 750px;
            max-height: 2100px;
            border-radius: 2rem;
            padding: 1rem 0;
            margin: auto; 
            overflow: hidden;
            box-shadow: 0 3px 35px -12px white;
            border: 1px solid #f6f9fc;
            transition: transform 0.2s ease;
        }

        .form-cont:hover{
            transform: translateY(-4px);
        }

        .form {
            width: 100%;
            height:100%;
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }

        .link {
            color: black;
            text-align: center;
            margin: auto;
        }

        .footer {
            text-align: center;
            color:white;
            border-top: 1px solid wheat;
            margin-top: 3rem;
        }

    </style>
</head>
<body>
    <div class="nav">
        <div class="title-cont">
            <p>💡InnoClash</p>
        </div>
        <div class="nav-cont">
            <i class="fas fa-home"></i><a class="active" href="index.html">HOME</a>
            <i class="fas fa-list"></i><a href="category.html">CATEGORY</a>
            <i class="fas fa-pen-to-square"></i><a href="signup.html">SIGNUP</a>
        </div>
    </div>
    <div class="title">
        <h1>Register Now!!!</h1>
        <p>Become the next generation of innovators.</p>
    </div>
    <div class="form-cont">
        <div class="form">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfS1DNzAnIzZasjv7iWqng4dNQt1fYqdBA8K7TCLoemrkPHug/viewform?embedded=true" 
            width="100%" height="1950px" frameborder="0" marginheight="0" marginwidth="0">Loading…
            </iframe>
        </div>
        <div class="link">
            <p>Having trouble viewing the form?<a href="https://forms.gle/fVnSwdakLzQK51Kg6">Click here to access it directly.</a></p>
        </div>
    </div>
    <div class="footer">
        <h6>100% dibuat sendiri. Laman web ini hanyalah untuk tujuan kursus asas pembangunan web.</h6>
    </div>
</body>
